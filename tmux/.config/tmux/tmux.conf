# Terminal
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"

# Advertise modified-key support so CLIs can distinguish Shift+Enter from Enter.
set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features ",xterm*:extkeys,screen*:extkeys,tmux*:extkeys"

# Ergonomics
set -g mouse on
set -g escape-time 10
set -g history-limit 100000
set -g detach-on-destroy off
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Navigation
bind -n M-H previous-window
bind -n M-L next-window
bind -n M-h previous-window
bind -n M-l next-window

# Splits and windows open from the current pane directory.
bind c new-window -c '#{pane_current_path}'
bind v split-window -v -l 12 -c '#{pane_current_path}'
bind h split-window -h -c '#{pane_current_path}'

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"

# Fast pane resizing.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

# Safer close bindings.
unbind q
bind q kill-pane
bind o kill-window

# Config lifecycle.
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Restore sessions without relaunching chat/agent CLIs.
set -g @resurrect-dir '$HOME/.local/share/tmux/resurrect'
set -g @resurrect-processes '"~make run" "~node /usr/bin/pnpm start->pnpm start" "~node /usr/bin/pnpm dev->pnpm dev" "~bun dev"'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @continuum-boot 'on'
set -g @continuum-systemd-start-cmd 'new-session -d'

# UI
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 120
set -g display-time 4000

set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_tabs_enabled 'on'
set -g @catppuccin_left_separator ''
set -g @catppuccin_right_separator ''
set -g status-left ''
set -g status-right ''
set -g status-style 'default'
setw -g window-status-format 'default'
setw -g window-status-current-format 'default'
set -g mode-style 'fg=#1F1F28,bg=#DCA561,bold'
set -g message-style 'fg=#DCD7BA,bg=#2A2A37,align=centre'
set -g message-command-style 'fg=#DCD7BA,bg=#2A2A37,align=centre'

# Keep continuum last so autosave keeps working when themes set status-right.
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.config/tmux/plugins/tpm/tpm'

# Post-theme overrides. These stay after TPM so the theme cannot make them too subtle.
source-file ~/.config/tmux/pane-status.conf
set-hook -g client-attached 'source-file ~/.config/tmux/pane-status.conf'
run-shell -d 1 'tmux source-file ~/.config/tmux/pane-status.conf'

# Keep window numbers on the left side of each status tab.
source-file ~/.config/tmux/window-status.conf
run-shell -d 1 'tmux source-file ~/.config/tmux/window-status.conf'
