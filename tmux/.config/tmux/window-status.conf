# Window tabs: number on the left, repository-aware label, visible separators.
setw -g window-status-separator ''
setw -g window-status-format '#[fg=#1F1F28,bg=#1F1F28] #[fg=#C8C093,bg=#363646] #I #[fg=#363646,bg=#223249]#[fg=#DCD7BA,bg=#223249]  #(~/.config/tmux/window-name "#{pane_current_path}")  #[fg=#223249,bg=#1F1F28]'
setw -g window-status-current-format '#[fg=#1F1F28,bg=#1F1F28] #[fg=#1F1F28,bg=#957FB8,bold] #I #[fg=#957FB8,bg=#2A2A37]#[fg=#DCD7BA,bg=#2A2A37,bold]  #(~/.config/tmux/window-name "#{pane_current_path}")  #[fg=#2A2A37,bg=#1F1F28]'
