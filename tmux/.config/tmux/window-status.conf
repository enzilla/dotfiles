# Window tabs: number on the left, repository-aware label, visible separators.
setw -g window-status-separator ''
setw -g window-status-format '#[fg=#cdd6f4,bg=#45475a] #I #[fg=#cdd6f4,bg=#313244] #(~/.config/tmux/window-name "#{pane_current_path}") #[fg=#313244,bg=#1e1e2e]'
setw -g window-status-current-format '#[fg=#1e1e2e,bg=#cba6f7,bold] #I #[fg=#1e1e2e,bg=#b4befe,bold] #(~/.config/tmux/window-name "#{pane_current_path}") #[fg=#b4befe,bg=#1e1e2e]'
