# Pane separators and compact pane labels.
set -g pane-border-lines heavy
set -g pane-border-style 'fg=#49495A'
set -g pane-active-border-style 'fg=#957FB8'
set -g pane-border-status top
set -g pane-border-indicators colour
set -g pane-border-format '#[fg=#727169] #P #[fg=#DCD7BA]#(~/.config/tmux/window-name "#{pane_current_path}") '
set -g mode-style 'fg=#1F1F28,bg=#DCA561,bold'
set -g copy-mode-selection-style 'fg=#1F1F28,bg=#DCA561,bold'
set -g copy-mode-position-style 'fg=#1F1F28,bg=#7E9CD8,bold'
set -g copy-mode-match-style 'fg=#1F1F28,bg=#957FB8,bold'
set -g copy-mode-current-match-style 'fg=#1F1F28,bg=#C0A36E,bold'
