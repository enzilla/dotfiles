# Pane separators and compact pane labels.
set -g pane-border-lines heavy
set -g pane-border-style 'fg=#585b70'
set -g pane-active-border-style 'fg=#cba6f7'
set -g pane-border-status top
set -g pane-border-indicators colour
set -g pane-border-format '#[fg=#6c7086] #P #[fg=#cdd6f4]#(~/.config/tmux/window-name "#{pane_current_path}") '
set -g mode-style 'fg=#1e1e2e,bg=#cba6f7,bold'
